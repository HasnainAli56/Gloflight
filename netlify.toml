[build]
  command = "bun run build"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "20"
  NITRO_PRESET = "static"

# Fallback for any route that wasn't prerendered (e.g. typo'd deep link).
# Static HTML files take precedence; this only catches misses so users see
# the app shell instead of Netlify's 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
